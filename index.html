<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mil Finans</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --mil-dark: #0f172a; --mil-red: #e11d48; --mil-green: #22c55e; --mil-orange: #f59e0b; --mil-blue: #3b82f6; --mil-bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--mil-bg); margin: 0; padding: 10px; padding-bottom: 40px; }
        
        .header-card { background: var(--mil-dark); color: white; padding: 15px; border-radius: 20px; text-align: center; margin-bottom: 10px; }
        .kasa-box { background: rgba(34, 197, 94, 0.1); border: 1px solid var(--mil-green); padding: 10px; border-radius: 15px; margin-top: 10px; }
        .kasa-box small { font-size: 10px; color: var(--mil-green); font-weight: 800; text-transform: uppercase; }
        .kasa-box div { font-size: 22px; font-weight: 900; color: var(--mil-green); }

        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .s-box { background: white; padding: 10px; border-radius: 15px; text-align: center; border: 1px solid #e2e8f0; }
        .s-box b { font-size: 14px; }

        .filter-section { background: white; padding: 8px; border-radius: 12px; margin-bottom: 10px; display: flex; gap: 5px; }
        select { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #cbd5e1; font-weight: 600; }

        .form-container { background: white; padding: 15px; border-radius: 20px; margin-bottom: 15px; }
        input { width: 100%; padding: 10px; margin-bottom: 6px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--mil-red); color: white; font-weight: 800; cursor: pointer; }

        .job-card { background: white; padding: 12px; border-radius: 15px; margin-bottom: 10px; border-left: 6px solid #94a3b8; }
        .st-waiting { border-left-color: var(--mil-orange); } .st-doing { border-left-color: var(--mil-blue); } .st-done { border-left-color: var(--mil-green); }
        
        .money-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; background: #f8fafc; padding: 8px; border-radius: 10px; font-size: 10px; }
        .money-grid div { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; }
        .kalan-borc { text-align: center; padding: 8px; color: var(--mil-red); font-weight: 900; font-size: 14px; }

        .card-actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-top: 8px; }
        .btn-sm { padding: 8px 0; border: none; border-radius: 6px; color: white; font-size: 9px; font-weight: 700; }
        .bg-st { background: var(--mil-dark); } .bg-wa { background: #25D366; } .bg-pay { background: var(--mil-green); } .bg-del { background: #fee2e2; color: var(--mil-red); }
    </style>
</head>
<body>

<div class="header-card">
    <h1 style="margin:0; font-size: 18px;">MİL FİNANS</h1>
    <div id="conn-status" style="font-size:10px;">Bağlanıyor...</div>
    
    <div class="kasa-box">
        <small id="kasaLabel">BU AYIN KASASI</small>
        <div id="resKasa">0 TL</div>
    </div>
</div>

<div class="summary-grid">
    <div class="s-box"><small>AYLIK CİRO</small><br><b id="resCiro">0 TL</b></div>
    <div class="s-box"><small>AYLIK KÂR</small><br><b id="resProfit" style="color:var(--mil-green)">0 TL</b></div>
</div>

<div class="filter-section">
    <select id="fMonth" onchange="loadData()"><option value="1">Ocak</option><option value="2">Şubat</option><option value="3">Mart</option><option value="4">Nisan</option><option value="5">Mayıs</option><option value="6">Haziran</option><option value="7">Temmuz</option><option value="8">Ağustos</option><option value="9">Eylül</option><option value="10">Ekim</option><option value="11">Kasım</option><option value="12">Aralık</option></select>
    <select id="fYear" onchange="loadData()"><option value="2025">2025</option><option value="2026" selected>2026</option></select>
</div>

<div id="jobList"></div>

<div class="form-container">
    <input type="text" id="cName" placeholder="Müşteri Adı">
    <input type="text" id="wDesc" placeholder="İş Tanımı">
    <input type="number" id="tPrice" placeholder="Satış Fiyatı">
    <input type="number" id="tCost" placeholder="Maliyet">
    <input type="number" id="tPaid" placeholder="Peşinat">
    <button class="btn-save" onclick="addJob()">SİSTEME KAYDET</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCzS92_P_yDB50vb-MpRgbtnaj4aF8dzQA",
        authDomain: "miltakip.firebaseapp.com",
        projectId: "miltakip",
        databaseURL: "https://miltakip-default-rtdb.firebaseio.com",
        storageBucket: "miltakip.firebasestorage.app",
        messagingSenderId: "1033075543287",
        appId: "1:1033075543287:web:c02c56199db5ec70d517f2"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref(".info/connected").on("value", (s) => {
        const el = document.getElementById('conn-status');
        el.innerText = s.val() ? "● BULUT AKTİF" : "○ BAĞLANTI YOK";
        el.style.color = s.val() ? "#22c55e" : "#ef4444";
    });

    const now = new Date();
    document.getElementById('fMonth').value = now.getMonth() + 1;
    document.getElementById('fYear').value = now.getFullYear();

    function loadData() {
        db.ref("isler").on("value", (snap) => render(snap.val()));
    }

    function addJob() {
        const name = document.getElementById('cName').value.trim();
        const price = parseFloat(document.getElementById('tPrice').value) || 0;
        if(!name || price <= 0) return alert("Hata!");

        const itemId = Date.now().toString();
        const item = {
            id: itemId,
            name: name.toUpperCase(),
            work: document.getElementById('wDesc').value.toUpperCase() || "İŞ",
            total: price,
            cost: parseFloat(document.getElementById('tCost').value) || 0,
            paid: parseFloat(document.getElementById('tPaid').value) || 0,
            status: 'Bekliyor',
            m: now.getMonth() + 1,
            y: now.getFullYear()
        };

        db.ref("isler/" + itemId).set(item).then(() => {
            document.querySelectorAll('input').forEach(i => i.value = '');
        });
    }

    function render(data) {
        const list = document.getElementById('jobList');
        list.innerHTML = '';
        if(!data) return;

        const selM = parseInt(document.getElementById('fMonth').value);
        const selY = parseInt(document.getElementById('fYear').value);
        const currentM = now.getMonth() + 1;
        const currentY = now.getFullYear();

        let ciro = 0, karTotal = 0, kasaNakit = 0;

        Object.values(data).reverse().forEach(j => {
            // Sadece ŞU ANKİ GERÇEK AYIN tahsilatlarını kasaya ekle (Otomatik sıfırlama mantığı)
            if(j.m === currentM && j.y === currentY) {
                kasaNakit += j.paid;
            }

            // Filtrelenen ayın listesini göster
            if(j.m === selM && j.y === selY) {
                const kalan = j.total - j.paid;
                const netKar = j.total - j.cost;
                ciro += j.total; karTotal += netKar;

                let cls = j.status === 'Bitti' ? 'st-done' : (j.status === 'Yapılıyor' ? 'st-doing' : 'st-waiting');
                
                list.innerHTML += `
                    <div class="job-card ${cls}">
                        <div style="font-weight:800; font-size:14px;">${j.name}</div>
                        <div style="font-size:11px; color:#64748b; margin-bottom:8px;">${j.work}</div>
                        <div class="money-grid">
                            <div><span>Satış:</span><b>${j.total}</b></div>
                            <div><span>Maliyet:</span><b>${j.cost}</b></div>
                            <div><span>Alınan:</span><b style="color:var(--mil-green)">${j.paid}</b></div>
                            <div><span>Kâr:</span><b style="color:var(--mil-blue)">${netKar}</b></div>
                        </div>
                        <div class="kalan-borc">${kalan} TL</div>
                        <div class="card-actions">
                            <button class="btn-sm bg-st" onclick="upSt('${j.id}','${j.status}')">${j.status}</button>
                            <button class="btn-sm bg-pay" onclick="pay('${j.id}',${j.paid},${j.total})">ÖDEME AL</button>
                            <button class="btn-sm bg-wa" onclick="wa('${j.name}','${j.work}',${kalan})">WA</button>
                            <button class="btn-sm bg-del" onclick="del('${j.id}')">SİL</button>
                        </div>
                    </div>`;
            }
        });

        document.getElementById('resCiro').innerText = ciro.toLocaleString() + " TL";
        document.getElementById('resProfit').innerText = karTotal.toLocaleString() + " TL";
        document.getElementById('resKasa').innerText = kasaNakit.toLocaleString() + " TL";
        
        const aylar = ["", "OCAK", "ŞUBAT", "MART", "NİSAN", "MAYIS", "HAZİRAN", "TEMMUZ", "AĞUSTOS", "EYLÜL", "EKİM", "KASIM", "ARALIK"];
        document.getElementById('kasaLabel').innerText = aylar[currentM] + " KASASI (NAKİT)";
    }

    function upSt(id, cur) {
        const s = ['Bekliyor', 'Yapılıyor', 'Bitti'];
        db.ref("isler/" + id).update({ status: s[(s.indexOf(cur) + 1) % 3] });
    }

    function pay(id, p, t) {
        const v = prompt("Alınan miktar:", t - p);
        if(v) db.ref("isler/" + id).update({ paid: p + parseFloat(v) });
    }

    function del(id) { if(confirm("Kaydı sil?")) db.ref("isler/" + id).remove(); }
    function wa(name, work, rem) {
        const msg = `Selam ${name}, Mil Reklam'dan Fahrican ben. ${work} işiniz için kalan borç: ${rem} TL. Hayırlı işler.`;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    }

    loadData();
</script>
</body>
</html>
